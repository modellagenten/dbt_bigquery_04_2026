version: 2
models:
  - name: dim_users
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null

  - name: fct_daily_orders
    description: "Bestellungen aggregiert auf Tagesebene (Incremental)."
    columns:
      - name: order_day
        description: "Bestelldatum (Tag)."
        tests:
          - unique
          - not_null
      - name: n_orders
        tests:
          - not_null
