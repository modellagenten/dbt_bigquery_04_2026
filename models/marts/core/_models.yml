version: 2

models:

  - name: dim_products
    description: "products dim"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: category
        tests:
          - not_null
          
  - name: dim_users
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null
