version: 2
models:
  - name: dim_products
    description: "products dim"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: category
        tests:
          - not_null
          
  - name: dim_users
    columns:
      - name: user_id
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null
          
  - name: fct_orders
    description: "Angereichert mit Kennzahlen wie Anzahl der Bestellpositionen, Gesamterlös, Gesamtprofit, Dauer der Lieferung."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values:
                - Complete
                - Processing
                - Shipped
                - Cancelled
                - Returned

  - name: fct_order_items
    description: "..."
    columns:
    - name: order_item_id
      description: "Primärschlüssel."
      data_tests:
        - unique
        - not_null
    - name: order_id
      data_tests:
        - not_null
    - name: product_id
      data_tests:
        - not_null